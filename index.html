<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股智能全方位分析系統</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: #333; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        
        .search-box { text-align: center; margin: 40px 0 30px 0; }
        .search-box h1 { color: var(--primary); margin-bottom: 5px; }
        .search-box p { color: #7f8c8d; margin-top: 0; margin-bottom: 20px; }
        input { padding: 12px 15px; width: 280px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #3498db; }
        button { padding: 12px 25px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-left: 10px; }
        button:hover { background: #2980b9; }

        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eaeaea; }
        .card h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #ecf0f1; padding-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .data-label { font-weight: bold; color: #7f8c8d; font-size: 16px; }
        .data-value { font-size: 18px; font-weight: 600; color: var(--primary); }
        
        .highlight-green { color: var(--success); font-weight: bold; font-size: 18px; }
        .highlight-red { color: var(--danger); font-weight: bold; font-size: 18px; }
        .score-good { color: var(--primary); font-weight: bold; font-size: 18px; }
        
        .note { font-size: 13px; color: #95a5a6; margin-top: 15px; }
        .highlight-box { margin-top: 10px; font-size: 16px; color: #2c3e50; line-height: 1.5; }
        .loading { display: none; color: #3498db; font-weight: bold; text-align: center; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-box">
        <h1>📈 台股價值投資診斷系統</h1>
        <p>捨棄繁雜線圖，專注於基本面健康度與歷史估值</p>
        <input type="text" id="sid" placeholder="輸入代號 (如: 2455, 2330)">
        <button onclick="runAnalysis()">開始深度分析</button>
        <div id="loader" class="loading">📡 正在從雲端抓取最新數據...</div>
    </div>

    <div id="report" style="display:none;" class="grid">
        
        <div class="card full-width" style="padding: 20px 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span style="font-size: 14px; color: #7f8c8d;">股票名稱</span><br>
                    <b id="stockName" style="font-size: 24px; color: var(--primary);">-</b>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 14px; color: #7f8c8d;">目前股價</span><br>
                    <b id="stockPrice" style="font-size: 24px; color: var(--danger);">-</b>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🏥 股票健康度評估</h3>
            <div class="data-row">
                <span class="data-label">綜合評級：</span>
                <span id="healthScore" class="score-good">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">毛利率：</span>
                <span id="resGross" class="data-value" style="font-size: 14px; font-weight: normal; color: #95a5a6;">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">負債比率：</span>
                <span id="resDebt" class="data-value" style="font-size: 14px; font-weight: normal; color: #95a5a6;">-</span>
            </div>
            <div style="margin-top: 15px;">
                <span class="data-label">近期亮點：</span>
                <div id="resHighlight" class="highlight-box">-</div>
            </div>
        </div>

        <div class="card">
            <h3>🔍 核心基本面指標</h3>
            <div class="data-row">
                <span class="data-label">預估 EPS：</span>
                <span id="resEps" class="data-value">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">本益比 (PE)：</span>
                <span id="resPe" class="data-value">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">現金殖利率：</span>
                <span id="resYield" class="data-value">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">股價淨值比 (PB)：</span>
                <span id="resPb" class="data-value">-</span>
            </div>
        </div>

        <div class="card full-width">
            <h3>🎯 進出場策略建議 (歷史估值法)</h3>
            <div class="data-row" style="border-bottom: 1px solid #f0f0f0;">
                <span class="data-label">建議進場區間 (便宜/合理價)：</span>
                <span id="buyRange" class="highlight-green">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">建議賣出區間 (昂貴價)：</span>
                <span id="sellRange" class="highlight-red">-</span>
            </div>
            <div class="note">*註：此區間基於歷史平均本益比推算，非保證獲利之買賣建議。</div>
        </div>

    </div>

    <script>
        async function runAnalysis() {
            const id = document.getElementById('sid').value.trim();
            if(!id) return alert("請輸入股票代號！");
            
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            document.getElementById('report').style.display = 'none';

            try {
                const res = await fetch(`/.netlify/functions/stockInfo?id=${id}`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('report').style.display = 'grid';
                
                // 填入基礎資訊
                document.getElementById('stockName').innerText = `${data.id} ${data.name}`;
                document.getElementById('stockPrice').innerText = data.price + " 元";
                
                // 填入核心指標
                document.getElementById('resEps').innerText = data.eps + " 元";
                document.getElementById('resPe').innerText = data.pe + " 倍";
                document.getElementById('resYield').innerText = data.yield + " %";
                document.getElementById('resPb').innerText = data.pb;

                // 填入健康度 (截圖還原區)
                let peNum = parseFloat(data.pe);
                let score = "普 (🌟🌟🌟)";
                if (peNum > 0 && peNum < 15) score = "優 (🌟🌟🌟🌟🌟)";
                else if (peNum >= 15 && peNum <= 25) score = "良 (🌟🌟🌟🌟)";
                
                document.getElementById('healthScore').innerText = score;
                document.getElementById('resGross').innerText = data.grossMargin; // 佔位字
                document.getElementById('resDebt').innerText = data.debtRatio;    // 佔位字
                document.getElementById('resHighlight').innerText = data.highlight;

                // 填入進出場區間 (截圖還原區)
                document.getElementById('buyRange').innerText = data.buyRange;
                document.getElementById('sellRange').innerText = data.sellRange;

            } catch (err) {
                alert("錯誤：" + err.message);
                console.error(err);
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
