<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股智能分析系統</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: #1e293b; max-width: 1000px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        
        .search-box { text-align: center; margin: 40px 0; }
        .search-box h1 { font-size: 28px; color: #0f172a; margin-bottom: 5px; }
        .search-box p { color: #64748b; margin-bottom: 25px; }
        input { padding: 14px; width: 280px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 18px; outline: none; }
        button { padding: 14px 30px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-left: 10px; }
        button:hover { background: #1d4ed8; }

        .card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; }
        
        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; }
        
        /* 標籤與法人 */
        .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 13px; margin-right: 5px; margin-bottom: 10px; font-weight: bold; background: #e0f2fe; color: #0369a1; }
        .trust-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .trust-box { text-align: center; padding: 12px; border-radius: 10px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 15px; }
        .plus { color: var(--danger); font-weight: bold; }
        .minus { color: var(--success); font-weight: bold; }

        /* 策略價格 */
        .price-container { display: flex; gap: 15px; }
        .price-box { flex: 1; text-align: center; padding: 20px; border-radius: 12px; border: 2px solid #e2e8f0; }
        .buy { background: #f0fdf4; border-color: var(--success); color: #166534; }
        .stop { background: #fef2f2; border-color: var(--danger); color: #991b1b; }
        .price-val { font-size: 28px; font-weight: 900; display: block; margin-top: 5px; }

        /* 數據列表 */
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .helper-box { font-size: 13px; color: #64748b; background: #f8fafc; padding: 10px 15px; border-radius: 8px; margin-top: 4px; border-left: 3px solid #cbd5e1; }
        
        .loading { display: none; color: var(--primary); font-weight: bold; text-align: center; margin-top: 15px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-box">
        <h1>📊 台股價值診斷系統</h1>
        <p>自動偵測上市/上櫃數據，整合法人籌碼與進出場策略</p>
        <input type="text" id="sid" placeholder="輸入代號 (如: 2455, 2330)">
        <button onclick="runAnalysis()">開始深度分析</button>
        <div id="loader" class="loading">📡 正在從雲端抓取最新數據...</div>
    </div>

    <div id="report" style="display:none;" class="grid">
        
        <div class="card">
            <h3 id="stockTitle">⚖️ 操盤策略與法人動向</h3>
            <div id="tagArea"></div>
            
            <div class="trust-grid">
                <div class="trust-box">外資<br><span id="foreign">-</span></div>
                <div class="trust-box">投信<br><span id="trust">-</span></div>
                <div class="trust-box">自營商<br><span id="dealer">-</span></div>
            </div>
            
            <div class="price-container">
                <div class="price-box buy">建議進場點<span class="price-val" id="buyP">-</span></div>
                <div class="price-box stop">關鍵止損點<span class="price-val" id="stopP">-</span></div>
            </div>
            
            <p style="margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px;">
                <b>💡 診斷結論：</b><span id="adviceText">-</span>
            </p>
        </div>

        <div class="card">
            <h3>🔍 核心基本面指標</h3>
            
            <div class="stat-row"><span>目前股價</span><b id="resPrice" style="font-size:18px;">-</b></div>

            <div class="stat-row"><span>EPS (預估盈餘)</span><b id="resEps" style="color:var(--primary); font-size:20px;">-</b></div>
            <div class="helper-box">💰 <b>實體獲利：</b>公司每股賺多少錢。數字越大獲利越強。</div>

            <div class="stat-row"><span>本益比 (PE)</span><b id="resPe">-</b></div>
            <div class="helper-box">🧠 <b>回本年數：</b>15以下便宜，25以上貴。高PE通常代表有強大題材。</div>

            <div class="stat-row"><span>現金殖利率</span><b id="resYield">-</b></div>
            <div class="helper-box">🏦 <b>定存利率：</b>每年配息率。 > 5% 適合存股。</div>

            <div class="stat-row"><span>股價淨值比 (PB)</span><b id="resPb">-</b></div>
        </div>
    </div>

    <script>
        // 產業題材標籤
        const themeDB = {
            "2455": { cate: "電子零組件", tags: ["低軌衛星", "5G 通訊"] },
            "2330": { cate: "半導體代工", tags: ["AI 核心", "先進製程"] }
        };

        async function runAnalysis() {
            const id = document.getElementById('sid').value.trim();
            if(!id) return alert("請輸入股票代號！");
            
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            document.getElementById('report').style.display = 'none';

            try {
                const res = await fetch(`/.netlify/functions/stockInfo?id=${id}`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('report').style.display = 'grid';
                document.getElementById('stockTitle').innerHTML = `⚖️ ${data.name} (${data.id}) 診斷報告`;
                
                // 填充數據
                document.getElementById('resPrice').innerText = data.price + " 元";
                document.getElementById('resEps').innerText = data.eps + " 元";
                document.getElementById('resPe').innerText = data.pe + " 倍";
                document.getElementById('resYield').innerText = data.yield + "%";
                document.getElementById('resPb').innerText = data.pb;
                document.getElementById('buyP').innerText = data.suggestedBuy + " 元";
                document.getElementById('stopP').innerText = data.suggestedStop + " 元";

                // 標籤
                const info = themeDB[id] || { cate: "一般產業", tags: [] };
                let tags = `<span class="tag">🏭 ${info.cate}</span>`;
                info.tags.forEach(t => tags += `<span class="tag">🔥 ${t}</span>`);
                document.getElementById('tagArea').innerHTML = tags;

                // 處理法人防呆 (避免 undefined 報錯)
                const updateTrust = (elId, val) => {
                    const el = document.getElementById(elId);
                    if (!val || val === "0") { el.innerText = "-"; el.className = ""; return; }
                    const num = parseInt(val.toString().replace(/,/g, ''));
                    el.innerText = (num > 0 ? "+" : "") + val;
                    el.className = num > 0 ? "plus" : "minus";
                };
                updateTrust('foreign', data.foreign);
                updateTrust('trust', data.trust);
                updateTrust('dealer', data.dealer);

                // 結論
                document.getElementById('adviceText').innerText = parseFloat(data.pe) > 25 ? 
                    " 屬高本益比股票，反映市場期待。進場務必嚴守止損點。" : " 估值合理，體質穩健。";

            } catch (err) {
                alert("伺服器連線失敗或找不到該代號：" + err.message);
                console.error(err);
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
