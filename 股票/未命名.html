<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股個股評估指南</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3498db;
        }
        .dashboard {
            display: none; /* 初始隱藏，搜尋後顯示 */
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .data-label {
            font-weight: bold;
            color: #7f8c8d;
        }
        .data-value {
            font-size: 16px;
            color: #2c3e50;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
        }
        .good {
            color: #27ae60;
            font-weight: bold;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <h1>📈 台股健康度評估儀表板</h1>
    
    <div class="search-container">
        <input type="text" id="stockInput" placeholder="請輸入股票代號或名稱 (例: 2330 或 鴻海)">
        <button onclick="searchStock()">分析評估</button>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="card">
            <h3>📊 基礎資訊速覽</h3>
            <div class="data-row"><span class="data-label">股票名稱：</span><span id="stockName" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">目前股價：</span><span id="stockPrice" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">近四季 EPS：</span><span id="stockEps" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">目前本益比：</span><span id="stockPe" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">最新殖利率：</span><span id="stockYield" class="data-value">-</span></div>
        </div>

        <div class="card">
            <h3>🏥 股票健康度評估</h3>
            <div class="data-row"><span class="data-label">綜合評級：</span><span id="healthScore" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">毛利率：</span><span id="grossMargin" class="data-value">-</span></div>
            <div class="data-row"><span class="data-label">負債比率：</span><span id="debtRatio" class="data-value">-</span></div>
            <div style="margin-top: 10px;">
                <span class="data-label">近期亮點：</span>
                <p id="newsHighlight" style="margin: 5px 0; font-size: 14px;">-</p>
            </div>
        </div>

        <div class="card full-width">
            <h3>🎯 進出場策略建議 (歷史估值法)</h3>
            <div class="data-row">
                <span class="data-label">建議進場區間 (便宜/合理價)：</span>
                <span id="buyPrice" class="data-value good">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">建議賣出區間 (昂貴價)：</span>
                <span id="sellPrice" class="data-value highlight">-</span>
            </div>
            <p style="font-size: 13px; color: #95a5a6; margin-top: 10px;">*註：此區間基於歷史平均本益比推算，非保證獲利之買賣建議。</p>
        </div>

        <div class="card full-width">
            <h3>💡 綜合結論與追蹤重點</h3>
            <p id="summaryText" style="line-height: 1.6;">-</p>
        </div>
    </div>

    <script>
        // 模擬資料庫 (未來這裡需要串接 Python/Node.js 後端 API 來獲取真實資料)
        const mockDatabase = {
            "2330": { name: "2330 台積電", price: "1,810", eps: "66.24", pe: "27.32", yield: "1.21%", score: "優 (🌟🌟🌟🌟🌟)", gross: "59.89%", debt: "38.2%", news: "AI 晶片需求強勁，CoWoS 產能滿載。", buy: "1,450 ~ 1,650 元", sell: "1,980 元以上", summary: "公司體質無懈可擊，是全球 AI 發展的絕對核心。目前股價已提前反映樂觀預期，適合在拉回至季線支撐時分批佈局。" },
            "台積電": "2330",
            
            "2317": { name: "2317 鴻海", price: "155.5", eps: "10.25", pe: "15.17", yield: "3.41%", score: "良 (🌟🌟🌟🌟)", gross: "6.30%", debt: "58.4%", news: "AI 伺服器出貨量逐季攀升，電動車佈局持續推進。", buy: "135 ~ 145 元", sell: "170 元以上", summary: "身為全球代工龍頭，受惠 AI 伺服器放量，獲利結構逐漸優化。股價波動相對溫和，適合逢低承接作為穩健配置。" },
            "鴻海": "2317"
        };

        function searchStock() {
            const input = document.getElementById('stockInput').value.trim();
            if (!input) {
                alert("請輸入股票代號或名稱！");
                return;
            }

            // 處理代號轉換
            let query = input;
            if (typeof mockDatabase[input] === "string") {
                query = mockDatabase[input]; // 將名稱轉換為代號
            }

            const data = mockDatabase[query];

            if (data) {
                // 填入資料
                document.getElementById('stockName').innerText = data.name;
                document.getElementById('stockPrice').innerText = data.price + " 元";
                document.getElementById('stockEps').innerText = data.eps + " 元";
                document.getElementById('stockPe').innerText = data.pe + " 倍";
                document.getElementById('stockYield').innerText = data.yield;
                
                document.getElementById('healthScore').innerText = data.score;
                document.getElementById('grossMargin').innerText = data.gross;
                document.getElementById('debtRatio').innerText = data.debt;
                document.getElementById('newsHighlight').innerText = data.news;

                document.getElementById('buyPrice').innerText = data.buy;
                document.getElementById('sellPrice').innerText = data.sell;
                document.getElementById('summaryText').innerText = data.summary;

                // 顯示儀表板
                document.getElementById('dashboard').style.display = 'grid';
            } else {
                alert("目前測試版資料庫僅包含示範標的（如：2330, 2317）。未來串接後端程式後即可查詢全市場台股！");
            }
        }
    </script>
</body>
</html>
